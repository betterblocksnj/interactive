<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PILOT vs Conventional Tax Flow | Better Blocks NJ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #2C3E50; background: #fff; padding: 1rem; max-width: 700px; margin: 0 auto; }
  svg text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  .t { font-size: 14px; fill: #2C3E50; }
  .ts { font-size: 12px; fill: #666; }
  .th { font-size: 14px; fill: #2C3E50; font-weight: 500; }
  .arr { stroke: #888; stroke-width: 1.5; }
  .leader { stroke: #ccc; stroke-width: 0.5; stroke-dasharray: 4 4; }
</style>
</head>
<body>
<svg width="100%" viewBox="0 0 680 520">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<text class="th" x="170" y="30" text-anchor="middle">Conventional tax</text>
<text class="th" x="510" y="30" text-anchor="middle">PILOT agreement</text>
<line x1="340" y1="15" x2="340" y2="505" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 4"/>
<rect x="80" y="50" width="180" height="44" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text class="th" x="170" y="76" text-anchor="middle" dominant-baseline="central">$6,000,000 total</text>
<line x1="170" y1="94" x2="170" y2="140" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="170" y="125" text-anchor="middle">Split by formula</text>
<rect x="40" y="150" width="130" height="56" rx="8" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
<text class="th" x="105" y="170" text-anchor="middle" dominant-baseline="central" fill="#0C447C">City</text>
<text class="ts" x="105" y="190" text-anchor="middle" dominant-baseline="central" fill="#185FA5">$2,580,000 (43%)</text>
<rect x="180" y="150" width="130" height="56" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="th" x="245" y="170" text-anchor="middle" dominant-baseline="central" fill="#085041">Schools</text>
<text class="ts" x="245" y="190" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">$2,220,000 (37%)</text>
<rect x="75" y="230" width="190" height="44" rx="8" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
<text class="th" x="170" y="256" text-anchor="middle" dominant-baseline="central" fill="#3C3489">County: $1,200,000 (20%)</text>
<rect x="420" y="50" width="180" height="44" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text class="th" x="510" y="76" text-anchor="middle" dominant-baseline="central">$4,000,000 total</text>
<line x1="510" y1="94" x2="510" y2="140" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="510" y="125" text-anchor="middle">Split by statute</text>
<rect x="380" y="150" width="130" height="56" rx="8" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
<text class="th" x="445" y="170" text-anchor="middle" dominant-baseline="central" fill="#0C447C">City</text>
<text class="ts" x="445" y="190" text-anchor="middle" dominant-baseline="central" fill="#185FA5">$3,800,000 (95%)</text>
<rect x="520" y="150" width="130" height="56" rx="8" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
<text class="th" x="585" y="170" text-anchor="middle" dominant-baseline="central" fill="#3C3489">County</text>
<text class="ts" x="585" y="190" text-anchor="middle" dominant-baseline="central" fill="#534AB7">$200,000 (5%)</text>
<rect x="380" y="230" width="270" height="44" rx="8" fill="#FAECE7" stroke="#F0997B" stroke-width="0.5"/>
<text class="th" x="515" y="256" text-anchor="middle" dominant-baseline="central" fill="#712B13">Schools: $0 directly from PILOT</text>
<text class="th" x="340" y="320" text-anchor="middle">But money is fungible</text>
<rect x="100" y="345" width="480" height="80" rx="12" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="th" x="340" y="370" text-anchor="middle" dominant-baseline="central" fill="#085041">The city's $3.8M PILOT surplus creates fiscal space</text>
<text class="ts" x="340" y="392" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">City doesn't need to raise its $2.58M through conventional taxes,</text>
<text class="ts" x="340" y="408" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">freeing that capacity for schools to collect their full levy</text>
<rect x="140" y="450" width="400" height="50" rx="8" fill="#FAEEDA" stroke="#FAC775" stroke-width="0.5"/>
<text class="th" x="340" y="468" text-anchor="middle" dominant-baseline="central" fill="#633806">Schools set their own levy and get 100%</text>
<text class="ts" x="340" y="486" text-anchor="middle" dominant-baseline="central" fill="#854F0B">Regardless of how PILOT revenue is distributed</text>
</svg>
</body>
</html>
