<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>How PILOT Revenue Flows in Jersey City | Better Blocks NJ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #2C3E50; background: #fff; padding: 1rem; max-width: 700px; margin: 0 auto; }
  svg text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  .t { font-size: 14px; fill: #2C3E50; }
  .ts { font-size: 12px; fill: #666; }
  .th { font-size: 14px; fill: #2C3E50; font-weight: 500; }
  .arr { stroke: #888; stroke-width: 1.5; }
</style>
</head>
<body>
<svg width="100%" viewBox="0 0 680 500">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text class="th" x="340" y="30" text-anchor="middle">How PILOT revenue flows in Jersey City</text>

<rect x="200" y="50" width="280" height="50" rx="10" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text class="th" x="340" y="70" text-anchor="middle" dominant-baseline="central">PILOT revenue: $4,000,000/yr</text>
<text class="ts" x="340" y="86" text-anchor="middle" dominant-baseline="central">Based on % of gross revenue or project cost</text>

<line x1="240" y1="100" x2="140" y2="150" class="arr" marker-end="url(#arrow)"/>
<line x1="440" y1="100" x2="540" y2="150" class="arr" marker-end="url(#arrow)"/>

<rect x="40" y="155" width="200" height="56" rx="8" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
<text class="th" x="140" y="175" text-anchor="middle" dominant-baseline="central" fill="#0C447C">City: $3,800,000</text>
<text class="ts" x="140" y="195" text-anchor="middle" dominant-baseline="central" fill="#185FA5">95% by state statute</text>

<rect x="440" y="155" width="200" height="56" rx="8" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
<text class="th" x="540" y="175" text-anchor="middle" dominant-baseline="central" fill="#3C3489">County: $200,000</text>
<text class="ts" x="540" y="195" text-anchor="middle" dominant-baseline="central" fill="#534AB7">5% by state statute</text>

<line x1="140" y1="211" x2="140" y2="248" class="arr" marker-end="url(#arrow)"/>

<rect x="40" y="252" width="200" height="56" rx="8" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
<text class="th" x="140" y="272" text-anchor="middle" dominant-baseline="central" fill="#0C447C">City keeps: $3,420,000</text>
<text class="ts" x="140" y="292" text-anchor="middle" dominant-baseline="central" fill="#185FA5">90% of city's share</text>

<line x1="240" y1="230" x2="440" y2="270" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="340" y="252" width="260" height="56" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="th" x="470" y="272" text-anchor="middle" dominant-baseline="central" fill="#085041">Schools: $380,000</text>
<text class="ts" x="470" y="292" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">10% allocated by JC since 2017</text>

<text class="th" x="340" y="345" text-anchor="middle">And money is fungible</text>

<rect x="60" y="365" width="560" height="110" rx="12" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="th" x="340" y="390" text-anchor="middle" dominant-baseline="central" fill="#085041">The remaining $3.42M in city PILOT revenue creates fiscal space</text>
<text class="ts" x="340" y="412" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">The city needs less from the shared tax base, freeing additional capacity</text>
<text class="ts" x="340" y="428" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">for schools to collect their full levy from conventional taxpayers.</text>
<text class="ts" x="340" y="452" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Schools set their own levy and receive 100% — regardless of PILOTs.</text>

</svg>
